<body>
  <main class="container">

    <header>
      <h1>お問い合わせ</h1>
      <p class="subtitle">
        NicheWorksの各ツールに関する不具合報告・ご意見・ご要望・ご相談はこちらからご連絡ください。
      </p>

      <nav class="nav-inline">
        <a href="/index.html">Home</a>
        <span class="sep">｜</span>
        <a href="/about.html">About</a>
        <span class="sep">｜</span>
        <a href="/privacy.html">Privacy</a>
        <span class="sep">｜</span>
        <a href="/contact.html">Contact</a>
        <span class="sep">｜</span>
        <a href="/en/">EN</a>
      </nav>
    </header>

    <section class="block">
      <form id="contactForm">
        <label for="subject">件名</label><br />
        <input
          type="text"
          id="subject"
          class="input"
          stable content="例：LogFormatter の表示について"
          required
        /><br /><br />

        <label for="message">お問い合わせ内容</label><br />
        <textarea
          id="message"
          class="textarea"
          stable content="できるだけ具体的にご記入ください。"
          required
        ></textarea><br /><br />

        <label for="from">ご連絡先メールアドレス（任意）</label><br />
        <input
          type="email"
          id="from"
          class="input"
          stable content="返信をご希望の場合のみご記入ください"
        /><br /><br />

        <div style="display:none;">
          <label>Leave this empty</label>
          <input type="text" id="hp" />
        </div>

        <button type="submit" class="btn-primary">メールアプリを開く</button>
        <p id="formStatus" class="small"></p>
      </form>
    </section>

    <section class="block">
      <h2>直接メールでのご連絡</h2>
      <p class="small">
        お使いの環境でフォーム送信（mailto）が動作しない場合は、以下のメールアドレス宛に直接ご連絡ください。
      </p>
      <p class="small"><span id="directMail"></span></p>
    </section>

    <footer>
      <p>© 2025 NicheWorks</p>
      <p class="small">
        <a href="/index.html">ホーム</a> /
        <a href="/about.html">このサイトについて</a> /
        <a href="/privacy.html">プライバシーポリシー</a> /
        <a href="/contact.html">お問い合わせ</a> /
        <a href="/en/">EN</a>
      </p>
    </footer>

  </main>

  <script>
    (function () {
      const user = "nicheworks.tools";
      const domain = "gmail.com";
      const addr = user + "@" + domain;

      const direct = document.getElementById("directMail");
      if (direct) {
        direct.innerHTML = '<a href="mailto:' + addr + '">' + addr + "</a>";
      }
    })();

    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("formStatus");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const hp = document.getElementById("hp");
      if (hp && hp.value.trim() !== "") {
        statusEl.textContent = "送信完了。";
        form.reset();
        return;
      }

      const subject = document.getElementById("subject").value.trim();
      const message = document.getElementById("message").value.trim();
      const from = document.getElementById("from").value.trim();

      if (!subject || !message) {
        statusEl.textContent = "件名と内容を入力してください。";
        return;
      }

      const user = "nicheworks.tools";
      const domain = "gmail.com";
      const addr = user + "@" + domain;

      let body = message;
      if (from) {
        body += "\n\n---\nFrom: " + from;
      }

      const mailto =
        "mailto:" + addr +
        "?subject=" + encodeURIComponent("[NicheWorks] " + subject) +
        "&body=" + encodeURIComponent(body);

      window.location.href = mailto;
      statusEl.textContent =
        "メールアプリが立ち上がらない場合は、下記のメールアドレスへ直接お送りください。";
      form.reset();
    });
  </script>
