<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NicheWorks Pro Unlock</title>
  <meta name="description" content="NicheWorks Pro購入後に、この端末で対応ツールのPro機能を有効化するページです。">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://nicheworks.app/pro/unlock/">
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <style>
    :root{--fg:#111;--muted:#666;--line:#ddd;--soft:#f6f6f6;--ok:#ecfdf5;--okline:#a7f3d0;--link:#0b57d0;--radius:14px;}
    html,body{margin:0;background:#fff;color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans JP",sans-serif;}
    a{color:var(--link)}.wrap{max-width:840px;margin:0 auto;padding:18px;}header{border-bottom:1px solid var(--line);}section{border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0;background:#fff;}.lead,.note{color:var(--muted);line-height:1.7;}.note{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px 12px;}.ok{background:var(--ok);border-color:var(--okline);}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}.btn{appearance:none;border:1px solid var(--line);background:#111;color:#fff;border-radius:12px;padding:10px 12px;text-decoration:none;cursor:pointer;font-size:16px;display:inline-block;}.btn.secondary{background:#fff;color:#111;}code{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:2px 6px;}@media(max-width:520px){.actions{flex-direction:column}.btn{text-align:center}}
  </style>
</head>
<body>
  <header><div class="wrap"><h1>NicheWorks Pro Unlock</h1><p class="lead">Stripe決済後に、この端末で対応ツールのPro機能を有効化します。</p></div></header>
  <main class="wrap">
    <section class="ok">
      <h2>Pro有効化</h2>
      <p id="state" class="note">状態を確認中です。</p>
      <div class="actions">
        <button class="btn" id="btn-unlock" type="button">この端末でProを有効化</button>
        <a class="btn secondary" href="/">NicheWorks Home</a>
        <a class="btn secondary" href="/tools/command-safety-checker/">Command Safety Checker</a>
        <a class="btn secondary" href="/tools/ats-paste-doctor/">ATS Paste Doctor</a>
      </div>
      <p class="note">この解除状態はブラウザのlocalStorageに <code>nw_pro_key</code> として保存されます。別端末・別ブラウザでは再度このページを開いて有効化してください。</p>
    </section>
    <section><h2>注意</h2><p>Proを有効化しても、各ツールの結果は法的・専門的判断を代替しません。重要な判断は公式情報や専門家に確認してください。</p></section>
  </main>
  <script>
    (function(){
      'use strict';
      var KEY = 'nw_pro_key';
      var state = document.getElementById('state');
      var button = document.getElementById('btn-unlock');
      function isPro(){ try { return !!localStorage.getItem(KEY); } catch(e) { return false; } }
      function unlock(){
        try {
          localStorage.setItem(KEY, '1');
          localStorage.setItem('nw_pro_unlocked_at', new Date().toISOString());
        } catch(e) {}
        render();
      }
      function render(){
        if (!state) return;
        state.textContent = isPro()
          ? '状態：この端末でNicheWorks Proが有効です。対応ツールに戻ってPro機能を使えます。'
          : '状態：まだこの端末ではNicheWorks Proが有効ではありません。下のボタンで有効化してください。';
      }
      if (button) button.addEventListener('click', unlock);
      unlock();
    })();
  </script>
</body>
</html>
