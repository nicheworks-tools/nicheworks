<body>
  <header>
    <div class="wrap">
      <h1>NicheWorks Pro Unlock</h1>
      <p class="lead">Stripe決済後に、この端末で対応ツールのPro機能を有効化します。</p>
    </div>
  </header>

  <main class="wrap">
    <section>
      <h2>Pro有効化</h2>
      <p id="tool-name" class="note">対象ツールを確認中です。</p>
      <p id="state" class="note">状態を確認中です。</p>
      <div class="actions">
        <button class="btn" id="btn-unlock" type="button">この端末でProを有効化</button>
        <a class="btn secondary" id="btn-back" href="/">ツールに戻る</a>
        <a class="btn secondary" id="btn-purchase" href="https://buy.stripe.com/14A6oJ3UZ1M1eWhbIHcV209" rel="noopener">購入ページを開く</a>
      </div>
      <p class="note">この解除状態はブラウザのlocalStorageに保存されます。別端末・別ブラウザでは再度有効化が必要です。</p>
    </section>

    <section class="warn">
      <h2>注意</h2>
      <p>Proを有効化しても、各ツールの結果は法的・専門的判断を代替しません。重要な判断は公式情報や専門家に確認してください。</p>
    </section>
  </main>

  <script>
    (function(){
      "use strict";
      var params = new URLSearchParams(location.search);
      var tool = params.get("tool") || "vibe-lexicon";
      var tools = {
        "vibe-lexicon": { label: "Vibe Lexicon", key: "nw_pro_vibe-lexicon", back: "/tools/vibe-lexicon/" },
        "logistics-compliance-kit-jp": { label: "Logistics Compliance Kit JP", key: "nw_pro_logistics-compliance-kit-jp", back: "/tools/logistics-compliance-kit-jp/" },
        "json-repair": { label: "JSON Repair", key: "nw_json_repair_pro_enabled_v1", back: "/tools/json-repair/" }
      };
      var config = tools[tool] || tools["vibe-lexicon"];
      var state = document.getElementById("state");
      var toolName = document.getElementById("tool-name");
      var unlock = document.getElementById("btn-unlock");
      var back = document.getElementById("btn-back");

      if(toolName) toolName.textContent = "対象ツール：" + config.label;
      if(back) back.href = config.back;

      function isPro(){
        try{ return localStorage.getItem(config.key) === "1"; }catch(e){ return false; }
      }
      function render(){
        if(!state) return;
        state.textContent = isPro()
          ? "状態：この端末でProが有効です。ツールに戻ってPro機能を使えます。"
          : "状態：まだこの端末ではProが有効ではありません。下のボタンで有効化してください。";
      }
      if(unlock){
        unlock.addEventListener("click", function(){
          try{ localStorage.setItem(config.key, "1"); }catch(e){}
          render();
          alert("この端末でProを有効化しました。");
        });
      }
      render();
    })();
  </script>
