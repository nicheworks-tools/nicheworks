<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>NicheWorks Pro Unlock</title>
  <meta name="description" content="NicheWorks Pro購入後に、この端末で対応ツールのPro機能を有効化するページです。">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;color:#111;background:#fff;line-height:1.7}.wrap{max-width:760px;margin:0 auto;padding:20px}.card{border:1px solid #ddd;border-radius:16px;padding:16px;margin:14px 0}.muted{color:#666}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid #111;background:#111;color:#fff;border-radius:12px;padding:10px 12px;text-decoration:none;cursor:pointer}.btn.secondary{background:#fff;color:#111}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>NicheWorks Pro Unlock</h1>
    <section class="card">
      <p id="toolName" class="muted">対象ツールを確認中です。</p>
      <p id="state" class="muted">Pro状態を確認中です。</p>
      <div class="row">
        <button id="unlock" class="btn" type="button">この端末でProを有効化</button>
        <a id="back" class="btn secondary" href="/tools/minutes-to-ops/">ツールに戻る</a>
      </div>
      <p class="muted">この解除状態はブラウザのlocalStorageに保存されます。別端末・別ブラウザでは再度有効化が必要です。</p>
    </section>
  </main>
  <script>
    (function(){
      var params=new URLSearchParams(location.search);
      var tool=params.get('tool')||params.get('pro')||'minutes-to-ops';
      var tools={
        'minutes-to-ops':{label:'Minutes to Ops',back:'/tools/minutes-to-ops/',keys:['nw_pro_minutes-to-ops','nw_pro_minutes_to_ops','nw_paid_minutes-to-ops','nw_paid_minutes_to_ops']},
        'logistics-compliance-kit-jp':{label:'Logistics Compliance Kit JP',back:'/tools/logistics-compliance-kit-jp/',keys:['nw_pro_logistics-compliance-kit-jp']},
        'json-repair':{label:'JSON Repair',back:'/tools/json-repair/',keys:['nw_json_repair_pro_enabled_v1']}
      };
      var cfg=tools[tool]||tools['minutes-to-ops'];
      var state=document.getElementById('state'),name=document.getElementById('toolName'),back=document.getElementById('back'),unlock=document.getElementById('unlock');
      function hasPro(){try{return cfg.keys.some(function(k){return localStorage.getItem(k)==='1'||localStorage.getItem(k)==='true'});}catch(e){return false;}}
      function activate(){try{cfg.keys.forEach(function(k){localStorage.setItem(k,'1');});}catch(e){} render();}
      function render(){if(name)name.textContent='対象ツール：'+cfg.label;if(back)back.href=cfg.back+'?pro='+encodeURIComponent(tool);if(state)state.textContent=hasPro()?'状態：この端末でProが有効です。ツールに戻ってPro機能を使えます。':'状態：まだこの端末ではProが有効ではありません。下のボタンで有効化してください。';}
      if(unlock)unlock.addEventListener('click',activate);
      activate();
      setTimeout(function(){location.href=cfg.back+'?pro='+encodeURIComponent(tool);},900);
    })();
  </script>
</body>
</html>
