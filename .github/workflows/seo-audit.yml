name: SEO audit

on:
  pull_request:
    paths:
      - 'index.html'
      - 'about.html'
      - 'privacy.html'
      - 'contact.html'
      - 'en/**'
      - 'tools/**'
      - 'scripts/audit-seo.mjs'
      - 'scripts/repair-seo-foundation.mjs'
      - 'sitemap.xml'
      - '.github/workflows/seo-audit.yml'
      - '.github/workflows/seo-auto-repair.yml'

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify SEO repair script has nothing to change
        run: |
          node scripts/repair-seo-foundation.mjs
          git diff --exit-code

      - name: Run SEO audit strict mode
        run: node scripts/audit-seo.mjs --strict
