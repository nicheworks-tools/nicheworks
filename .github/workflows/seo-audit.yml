name: SEO audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '404.html'
      - 'index.html'
      - 'about.html'
      - 'privacy.html'
      - 'contact.html'
      - 'en/**'
      - 'tools/**'
      - 'scripts/audit-seo.mjs'
      - 'scripts/audit-publishing-mode.mjs'
      - 'scripts/repair-seo-foundation.mjs'
      - 'robots.txt'
      - 'sitemap.xml'
      - '.github/workflows/seo-audit.yml'
  push:
    branches:
      - main
    paths:
      - '404.html'
      - 'index.html'
      - 'about.html'
      - 'privacy.html'
      - 'contact.html'
      - 'en/**'
      - 'tools/**'
      - 'scripts/audit-seo.mjs'
      - 'scripts/audit-publishing-mode.mjs'
      - 'scripts/repair-seo-foundation.mjs'
      - 'robots.txt'
      - 'sitemap.xml'
      - '.github/workflows/seo-audit.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify normal publishing mode
        run: node scripts/audit-publishing-mode.mjs

      - name: Run strict SEO audit
        run: node scripts/audit-seo.mjs --strict

      - name: Confirm repository was not modified
        run: git diff --exit-code
