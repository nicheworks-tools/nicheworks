name: Apply PR 482 label fixes

on:
  push:
    branches:
      - publishing-cleanup-482
    paths:
      - '.github/workflows/apply-pr482-targeted-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: publishing-cleanup-482

      - name: Align related-tool labels and destinations
        run: |
          python - <<'PY'
          from pathlib import Path

          file = Path('tools/command-safety-checker/usage.html')
          text = file.read_text(encoding='utf-8')
          replacements = {
              '<a href="/tools/command-safety-checker/">AI Output Safety Check</a>': '<a href="/tools/sql-db-risk-checker/">SQL / DB Risk Checker</a>',
              '<a href="/tools/unicode-kanji-checker/">Text Encoding Inspector</a>': '<a href="/tools/unicode-kanji-checker/">Unicode Kanji Checker</a>',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected text: {old}')
              text = text.replace(old, new)
          file.write_text(text, encoding='utf-8')
          PY

      - name: Commit label fixes
        run: |
          if git diff --quiet; then
            echo "Labels already aligned."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/command-safety-checker/usage.html
            git commit -m "Align related tool labels with destinations"
            git push origin HEAD:publishing-cleanup-482
          fi
