name: Update tools index

on:
  push:
    branches: [ "main" ]
    paths:
      - "tools/**"
      - "scripts/**"
      - ".github/workflows/update-tools-index.yml"
      - "!tools/tools-index.json"
      - "!tools/tools-index-review.json"

permissions:
  contents: write

concurrency:
  group: update-tools-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate tools index
        run: node scripts/generate-tools-index.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "nicheworks-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tools/tools-index.json
          git diff --cached --quiet || git commit -m "chore: update tools index"
          git push
