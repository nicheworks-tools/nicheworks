name: PR 492 common repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'work-492'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply common HTML repairs
        run: node scripts/apply-common-html-repairs.mjs

      - name: Commit repairs
        run: |
          if git diff --quiet; then
            echo "No repairs needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools
          git commit -m "Apply common HTML repairs"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
