name: SEO audit

on:
  workflow_dispatch:
  push:
    branches:
      - pr481-normal-publication

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate normal tools index
        run: node scripts/generate-tools-index.mjs

      - name: Print generated tools index
        run: cat tools/tools-index.json

      - name: Verify normal publishing mode
        run: node scripts/audit-publishing-mode.mjs

      - name: Run strict SEO audit
        run: node scripts/audit-seo.mjs --strict
