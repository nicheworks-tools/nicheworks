name: SEO auto repair

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'about.html'
      - 'privacy.html'
      - 'contact.html'
      - 'en/**'
      - 'tools/**'
      - 'scripts/audit-seo.mjs'
      - 'scripts/repair-seo-foundation.mjs'
      - 'sitemap.xml'
      - '.github/workflows/seo-auto-repair.yml'

permissions:
  contents: write

jobs:
  repair-and-audit:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip seo auto repair]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO foundation repair
        run: node scripts/repair-seo-foundation.mjs

      - name: Commit repaired SEO foundations if needed
        run: |
          if git diff --quiet; then
            echo "No SEO repair changes needed."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Apply SEO foundation auto repair [skip seo auto repair]"
            git push
          fi

      - name: Run strict SEO audit
        run: node scripts/audit-seo.mjs --strict

# trigger: clean sitemap after generator update
