name: Normalize tools index once

on:
  push:
    branches:
      - pr481-normal-publication

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: pr481-normal-publication

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate normal tools index
        run: node scripts/generate-tools-index.mjs

      - name: Commit generated index when changed
        run: |
          if git diff --quiet -- tools/tools-index.json; then
            echo "Tools index already normalized."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/tools-index.json
            git commit -m "Normalize canonical 87-tool index"
            git push origin HEAD:pr481-normal-publication
          fi
