name: Build Construction Tools Atlas packs

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/build-cta-packs.mjs

permissions:
  contents: write

jobs:
  build-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static split JSON packs
        run: node scripts/build-cta-packs.mjs
      - name: Commit generated packs
        run: |
          if git diff --quiet -- tools/construction-tools-atlas/data/packs; then
            echo "No pack changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/construction-tools-atlas/data/packs
          git commit -m "Build Construction Tools Atlas static packs"
          git push
