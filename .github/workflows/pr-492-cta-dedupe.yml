name: PR 492 CTA dedupe

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  dedupe:
    if: github.head_ref == 'work-492'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply deterministic CTA dedupe
        run: node tools/construction-tools-atlas/scripts/dedupe-quality-data.mjs --write-report

      - name: Verify duplicate audit
        run: node tools/construction-tools-atlas/scripts/audit-duplicates.mjs --summary-only

      - name: Commit deduplicated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/construction-tools-atlas/data
          git commit -m "Deduplicate Construction Tools Atlas data"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
