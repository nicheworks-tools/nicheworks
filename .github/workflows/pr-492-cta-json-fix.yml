name: PR 492 CTA JSON fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'work-492'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Repair quality batch JSON
        run: node tools/construction-tools-atlas/scripts/fix-quality-002-json.mjs

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/construction-tools-atlas/data/tools.quality-002.json
          git commit -m "Repair Construction Tools Atlas quality batch 002 JSON"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
