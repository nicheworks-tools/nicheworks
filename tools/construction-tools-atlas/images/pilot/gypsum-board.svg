<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Gypsum Board / 石膏ボード</title>
  <desc id="desc">A technical illustration of a gypsum board panel with a magnified cross-section callout.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3e8"/>
      <stop offset="1" stop-color="#e9e3d6"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3e0d8"/>
      <stop offset="1" stop-color="#c9c6bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="18" dy="24" stdDeviation="18" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <pattern id="gypsum-speckle" width="28" height="22" patternUnits="userSpaceOnUse">
      <rect width="28" height="22" fill="#f0ece2"/>
      <circle cx="5" cy="5" r="1.4" fill="#9b988f" opacity="0.55"/>
      <circle cx="18" cy="7" r="1.1" fill="#aaa69c" opacity="0.5"/>
      <circle cx="11" cy="16" r="1.2" fill="#8d8a82" opacity="0.45"/>
      <path d="M21 17l5 1" stroke="#9d998f" stroke-width="1" opacity="0.45"/>
      <path d="M2 18l6-1" stroke="#b2aea3" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect x="20" y="18" width="1632" height="904" rx="28" fill="#ffffff" stroke="#6f879f" stroke-width="4"/>
  <text x="836" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" fill="#26323d">Gypsum Board / 石膏ボード</text>
  <path d="M66 158h698M908 158h698" stroke="#6f879f" stroke-width="4"/>
  <circle cx="836" cy="158" r="7" fill="#6f879f"/>
  <path d="M792 158h30M850 158h30" stroke="#6f879f" stroke-width="7" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <polygon points="176,425 955,207 1492,333 678,692" fill="url(#paper)" stroke="#161a1f" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="176,425 678,692 678,725 176,458" fill="url(#edge)" stroke="#161a1f" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="678,692 1492,333 1492,361 678,725" fill="#d5d2c9" stroke="#161a1f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M214 445l746-205M251 465l740-205M292 486l735-207" stroke="#f7f4ec" stroke-width="1.5" opacity="0.42"/>
  </g>

  <circle cx="754" cy="634" r="68" fill="none" stroke="#6f879f" stroke-width="4" opacity="0.95"/>
  <path d="M815 666 C905 702 996 728 1085 741" fill="none" stroke="#6f879f" stroke-width="4"/>

  <g>
    <circle cx="1248" cy="692" r="182" fill="#fbfbf9" stroke="#6f879f" stroke-width="5"/>
    <clipPath id="clipCircle"><circle cx="1248" cy="692" r="176"/></clipPath>
    <g clip-path="url(#clipCircle)">
      <polygon points="1080,661 1398,616 1450,654 1134,704" fill="#f7f2e6" stroke="#12161a" stroke-width="3"/>
      <polygon points="1134,704 1450,654 1450,762 1134,806" fill="url(#gypsum-speckle)" stroke="#12161a" stroke-width="3"/>
      <polygon points="1080,661 1134,704 1134,806 1080,760" fill="#d8d4ca" stroke="#12161a" stroke-width="3"/>
      <path d="M1138 708 C1190 702 1260 690 1338 679 C1378 673 1418 665 1448 657" stroke="#737373" stroke-width="2" fill="none" opacity="0.8"/>
      <path d="M1135 792 C1208 785 1284 774 1360 764 C1392 760 1422 756 1450 752" stroke="#737373" stroke-width="2" fill="none" opacity="0.75"/>
    </g>
  </g>
